# ============================================
# ESP32 飞书控制器 - Nginx 反向代理配置
# 路径: /etc/nginx/sites-available/esp32-backend
# 使用方法:
#   1. 复制到 Nginx 配置目录
#   2. 修改 server_name 为你的域名
#   3. 启用 SSL（推荐）
#   4. 测试并重启: nginx -t && systemctl reload nginx
# ============================================

# HTTP -> HTTPS 重定向（可选，取消注释启用）
# server {
#     listen 80;
#     listen [::]:80;
#     server_name your-domain.com;
#     
#     location / {
#         return 301 https://$server_name$request_uri;
#     }
# }

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;  # 修改为你的域名

    # SSL 证书配置（使用 Let's Encrypt 建议路径）
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 日志
    access_log /var/log/nginx/esp32_access.log;
    error_log /var/log/nginx/esp32_error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # 主应用代理
    location / {
        proxy_pass http://127.0.0.1:5000;
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket 支持（如需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffer 设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 健康检查端点（无需代理到后端）
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # 允许无缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 静态文件（如有）
    location /static/ {
        alias /opt/esp32-controller/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
